# Server & System
server.port=8080
spring.threads.virtual.enabled=true

# Voyage AI Core Settings
voyage.api-key=${VOYAGEAI_API_KEY}
voyage.base-url=https://api.voyageai.com/
voyage.embedding-url=https://api.voyageai.com/v1/embeddings
voyage.chat-url=https://api.voyageai.com/v1/chat/completions

# Tier 1: Routing Optimization (MRL)
voyage.routing.model=voyage-4
voyage.routing.threshold=0.15
voyage.routing.dimension=512
voyage.routing.clarification-threshold=0.10


# Tier 2: Expert Model Mapping
voyage.experts.code-model=voyage-code-3
voyage.experts.finance-model=voyage-finance-2
voyage.experts.general-model=voyage-4

#MongoDB - Cache Settings
spring.data.mongodb.uri=mongodb://localhost:27017/ayedata_moe
spring.data.mongodb.database=ayedata_moe
spring.data.mongodb.cache.ttl=3600
spring.data.mongodb.auto-index-creation=true